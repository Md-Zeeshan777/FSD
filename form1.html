<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Form</title>

</head>
<body>
   <center> <h1>FILL THE REQUIRED INFORMATION</h1> </center>
   <form>
   <hr>
   <br>
   <div>
   <label>Enter your name-</label>
   <input type="text" name="Name" placeholder="Your Name" required>
   </div>
   <br>
   <br>
   <div>
    <label>Phone Number-</label>
   <input type="number" value="Number" placeholder="xxxxxxxxxx" required>
   </div>
   <br>
   <br>
   <div>
   <label>Your Gender-</label>
   <input type="radio" id="Gender1" name="gender" value="Male">Male
   <input type="radio" name="gender" value="Female">Female
   <input type="radio" name="gender" value="Insane">Confused
   </div>
   <br>
   <br>
     <div>
   <label>Your Date of Birth-</label>
   <input type="date"  id="DOB" value="Number" required>
   </div><br>
   <br>
   
     <div>
   <label>Enter your Email</label>
   <input type="Email" name="Email" placeholder="xyz@gmail.com" required>
   </div>
   <br>
     <div>
   <label>Enter Password</label>
   <input type="Password" name="Password" placeholder="xxxxxxxx" required>
   </div>
   </form>
   <div>
   <button type="submit">Submit</button>

    
   </div>
   
</body>
</html>
